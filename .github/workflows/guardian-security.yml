name: DevSecOps Guardian

on: 
  push: #scan will proceed on push
    branches: [main, develop] #push to the following branches
  pull_request: #on pull request
    branches: [main]
  
jobs:
#LAYER 1 - SECRET SCAN / SCA
  Vulnerability-triage:
    runs-on: ubuntu-latest #pulls up a virtual linux machine to run tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 #Pulls code into linux machine to make it readable
        with:
          fetch-depth: 0 #Github only looks at most recent, 0 sets this to entire history of project

      - name: Setup Node.js
        uses: action/setup-node@v4 #setup node.js environment for testing
        with:
          node-version: '20' #Node.js version

      - name: Install Dependencies
        run: npm ci #safer than 'npm install' - installing a clean version of dependencies

      - name: Run Security Linter #Acts as a SAST
      #What is SAST? Static Application Security Tool: A way of testing code without running it
      #Checking for general coding bugs and insecure coding methods; identifies SQL injection,continue-on-error
      #XSS, etc.Common tools for this are Bandit(Python), ESLint(Javascript) or Gosec(Go). Still basic testing
        run: npm run lint
        #triggers ESLint rules(eval() and unsafe-regex)continue-on-error: 

      - name: Scan for Hardcoded Secrets #Smartbot that looks for Strings resembling AWS keys or Firebase tokens
        uses: trufflesecurity/trufflehog@main #trufflehog is the the bot type and @main is branch being used on
        with:
          path: ./ #means scan entire repository
          base: ${{ github.event.repository.default_branch }} #grabs repo default branch which is usually main
          extra_args: --debug --only-verified #modifies how the scanner behaves: --debug gives verbose logs which makes it easier to troubleshoot
          #--only-verified only shows real secrets and reduces false positives
        
      - name: GitGuardian Scan
        uses: GitGuardian/ggshield-action@v1.27.0 #Pulls in GitGuardian engine that scans for over 400+ credential types
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }} #Secure variable that connects to private API key without showing in logs
          
      - name: Dependency Scan (Snyk) #checks project libraries and packages(npm, pip, etc.) for known CVEs
      #Could be outdated or insecure packages
        uses: snyk/actions/node@master # Snyk version for node.js and master means latest or could do:
        #snyk/actions/python@master for python code, etc.
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} #Requires API token
        with:
          args: --severity-threshold=high #Controls what level of issues fail the pipeline

#Layer 2 - CODE ANALYSIS (SAST) Static Code analysis
  static-analysis:
    needs: Vulnerability-triage #Dependency: if secret scan failed(Ex. Leaked password), this task wont start
    runs-on: ubuntu-latest
    permissions:
      security-events: write #Gives guardian permission to write findings into repo report
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL #CodeQL doesnt just read text but builds a map of data flows to find sql injections or insecure data routing
        uses: github/codeql-action/init@v3 #initialization of CodeQL
        with:
          languages: javascript, typescript, python #Could add or change the languages being used
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3 #Actual use of CodeQL
        
#Layer 3 - IaC (Cloud) - Only used for cloud security like Docker; optional comment out
  infrastructure-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov (IaC Scan)
        uses: bridgecrewio/checkov-action@master #scans Dockerfile and GitHub actions for misconfigurations like running container as root
        with:
          directory: .
          framework: dockerfile, github_actionsz
        
#Layer 4 - Dependency Audit (Prevents members from adding libraries with high vulnerabilities and prevents from dangerous licenses(stay out of legal issues)
#Gets inforced before CI
  dependency-audit:
     runs-on: ubuntu-latest
     steps:
       - name: Checkout Repository
         uses: actions/checkout@v4
         with:
        #Only fail build for high or critical vulnerabilities
           severity-threshold: high
          #These licenses  are blocked because they could force open-source code
           deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
       - name: Security Audit Dependencies
         run: npm audit --audit-level=high #Queries the global database of hacked libraries, blocks build if one is detected
#Layer 5 - Container Security
  container-security:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v4

     - name: Build local Docker image
       run: docker build -t club-webapp:latest #Assembles Docker machine and takes Docketfile to build container, tagged to know which object to inspect
        #club-webapp is an image
     - name: Scan Imagge with Trivy #Trivy contains a database of CVE and compares them with Docker Image
       uses: aquasecurity/trivy-action@master #Trivy scans the internal Linux OS inside the container for vulnerabilities
       with:
         image-ref: 'club-webapp:latest' #points Trivy to specific images we built
         format: 'table' #Format: makes output readable in Github actions logs
         exit-code: '1'
         ignore-unfixed: true #Filters "noise", often vulnerabilities are found that don't have a fix yet so we don't respond
         severity: 'CRITICAL,HIGH' #threshhold for guardian to not stop the development because of a low level risk
         
  gatekeeper:
    needs: [Vulnerability-triage, static-analysis, infrastructure-security, dependency-audit, container-security] #Ensures all scans finish first
    runs-on: ubuntu-latest
    if: always() #runs even if previous steps failed so failure is reported
    steps:
      - name: Shield Status
        if: ${{ !contains(needs.*.result, 'failure') }}
        run: echo " Guardian is Active. Code is Secure. "

      - name: Shield Failure
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          echo " Security Breach Detected. Found Vulnerabilities. Deployment Blocked. "
          exit 1
          
          #Secret Orchestration(AWS Secrets Manager, HashiCorp Vault)
          #WAF(Cloud Flare)
          #Supply Chain Integrity(Sign commits with GPG Key)
